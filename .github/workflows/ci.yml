name: BetterDiscord CI

on:
  workflow_dispatch:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Lint code
        run: bun run lint

      - name: Build asar
        run: bun run dist
        env:
          BRANCH_NAME: ${{github.head_ref || github.ref_name}}
          COMMIT_HASH: ${{github.sha}}

      # Only upload artifact on PR, otherwise it gets pushed to canary
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: ${{github.event_name == 'pull_request'}}
        with:
          if-no-files-found: error
          retention-days: 30
          path: dist/betterdiscord.asar

      # Keep a single rolling release for the latest develop commit.
      - name: Reset rolling release
        if: ${{github.event_name == 'push' || github.event_name == 'workflow_dispatch'}}
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: gh release delete develop-latest --yes --cleanup-tag || true

      - name: Publish rolling release
        if: ${{github.event_name == 'push' || github.event_name == 'workflow_dispatch'}}
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          gh release create develop-latest dist/betterdiscord.asar \
            --target "${GITHUB_SHA}" \
            --title "BD Dev Fork" \
            --notes "Rolling release for the latest develop commit.\n\nCommit: ${GITHUB_SHA}"
